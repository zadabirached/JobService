services:

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_DB: jobservice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - jobservice-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - jobservice-net

  jobservice:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ConnectionStrings__JobService: "Host=postgres;Database=jobservice;Username=postgres;Password=postgres"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - jobservice-net

  replaytool:
    build:
      context: ../ReplayTool
      dockerfile: Dockerfile
    environment:
      STORAGE_ROOT: /app/cases
      JOBSERVICE_DB: "Host=postgres;Database=jobservice;Username=postgres;Password=postgres"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      # Compose service hostnames ("postgres"/"rabbitmq") are not literally "localhost", so the
      # LocalTargetGuard safety check would otherwise refuse them. This stack is a deliberately
      # local dev/test environment, not a captured prod target, so the override is safe here.
      REPLAY_ALLOW_REMOTE_DB: "true"
    volumes:
      - replay-cases:/app/cases
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      jobservice:
        condition: service_started
    networks:
      - jobservice-net

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - jobservice-net

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - jobservice-net

networks:
  jobservice-net:
    driver: bridge

volumes:
  replay-cases:
